<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="busGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Body -->
  <rect x="12" y="8" width="40" height="42" rx="8" fill="url(#busGrad)"/>
  <!-- Windshield -->
  <rect x="16" y="12" width="32" height="14" rx="4" fill="#e0f2fe" opacity="0.95"/>
  <!-- Side Windows -->
  <rect x="16" y="30" width="12" height="8" rx="2" fill="#e0f2fe" opacity="0.85"/>
  <rect x="36" y="30" width="12" height="8" rx="2" fill="#e0f2fe" opacity="0.85"/>
  <!-- Headlights -->
  <circle cx="20" cy="45" r="3" fill="#fbbf24"/>
  <circle cx="44" cy="45" r="3" fill="#fbbf24"/>
  <!-- Wheels -->
  <circle cx="22" cy="54" r="5" fill="#1e293b"/>
  <circle cx="22" cy="54" r="2.5" fill="#64748b"/>
  <circle cx="42" cy="54" r="5" fill="#1e293b"/>
  <circle cx="42" cy="54" r="2.5" fill="#64748b"/>
  <!-- Route indicator line -->
  <rect x="24" y="14" width="16" height="2" rx="1" fill="#3b82f6" opacity="0.5"/>
</svg>
